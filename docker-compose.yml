version: '2'
services:
  db:
    image: postgres:13
    container_name: postgres13
    user: root
    environment:
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - POSTGRES_DB=postgres
    restart: always             # run as a service
    volumes:
      - ./postgresql:/var/lib/postgresql/data

  odoo14:
    image: odoo:14
    container_name: odoo14
    user: root
    depends_on:
      - db
    ports:
      - "8014:8069"
    tty: true
    command: --
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - ./addons/extra-addons:/mnt/extra-addons
      - ./addons:/mnt/enterprise
      - ./etc:/etc/odoo
    restart: always             # run as a service

version: '3.1'
services:
  web:
    image: odoo:15
    container_name: odoo-15
    depends_on:
      - db
    ports:
      - "8015:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=myodoo
    volumes:
      - ./addons/extra-addons:/mnt/extra-addons
      - ./addons/enterprise:/mnt/enterprise
      - ./odoo.conf:/etc/odoo/odoo.conf
    command: -d test

  db:
    image: postgres:13
    container_name: postgres-13
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=myodoo
      - POSTGRES_USER=odoo
